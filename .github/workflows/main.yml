name: Build SanJoyApp

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ---------- Android 打包 ----------
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - run: flutter pub get

      # ⭐ 修复：确保 Android 平台支持完整
      - name: Ensure Android platform support
        run: flutter create --platforms=android .

      - run: flutter analyze || true

      - run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/app-release.apk

  # ---------- macOS 打包 ----------
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - run: flutter pub get

      - name: Add macOS desktop support
        run: flutter create --platforms=macos .

      # ⭐ 修复：配置权限（仅在 macOS 构建中运行）
      - name: Configure platform permissions
        run: |
          chmod +x scripts/configure_platforms.sh
          ./scripts/configure_platforms.sh macos   # 传入参数，只配置 macOS

      - run: flutter build macos --release

      - name: Upload macOS App
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/*.app
