name: Build SanJoyApp

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - run: flutter pub get

      - name: Ensure Android platform support
        run: flutter create --platforms=android .

      - name: Fix Gradle configuration
        run: |
          # 修复根 build.gradle：添加 ext 属性（如果不存在）
          ROOT_GRADLE="android/build.gradle"
          if ! grep -q 'ext {' "$ROOT_GRADLE"; then
            echo "添加 ext 块到根 build.gradle"
            # 在 buildscript 前插入 ext 块
            sed -i.bak '/buildscript {/i ext { compileSdkVersion = 34; targetSdkVersion = 34; minSdkVersion = 21 }' "$ROOT_GRADLE"
          else
            echo "ext 已存在"
          fi

          # 修复 app/build.gradle
          APP_GRADLE="android/app/build.gradle"
          if [ -f "$APP_GRADLE" ]; then
            sed -i.bak 's/compileSdkVersion [0-9]*/compileSdkVersion 34/' "$APP_GRADLE"
            if ! grep -q 'compileSdkVersion' "$APP_GRADLE"; then
              sed -i.bak '/android {/a compileSdkVersion 34' "$APP_GRADLE"
            fi
            if grep -q 'targetSdkVersion' "$APP_GRADLE"; then
              sed -i.bak 's/targetSdkVersion [0-9]*/targetSdkVersion 34/' "$APP_GRADLE"
            else
              sed -i.bak '/android {/a targetSdkVersion 34' "$APP_GRADLE"
            fi
            if ! grep -q 'minSdkVersion' "$APP_GRADLE"; then
              sed -i.bak '/android {/a minSdkVersion 21' "$APP_GRADLE"
            fi
            echo "app/build.gradle 已更新"
          fi

      - name: Configure Android permissions
        run: |
          chmod +x scripts/configure_platforms.sh
          ./scripts/configure_platforms.sh android

      - run: flutter analyze || true
      - run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/app-release.apk

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - run: flutter pub get

      - name: Add macOS desktop support
        run: flutter create --platforms=macos .

      - name: Configure macOS permissions
        run: |
          chmod +x scripts/configure_platforms.sh
          ./scripts/configure_platforms.sh macos

      - run: flutter build macos --release

      - name: Upload macOS App
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/*.app
