name: Build SanJoyApp

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - run: flutter pub get

      - name: Ensure Android platform support
        run: flutter create --platforms=android .

      - name: Fix Gradle configuration
        run: |
          chmod +x scripts/fix_android_gradle.sh
          ./scripts/fix_android_gradle.sh

      - name: Configure Android permissions
        run: |
          chmod +x scripts/configure_platforms.sh
          ./scripts/configure_platforms.sh android

      - run: flutter analyze || true
      - run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/app-release.apk

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - run: flutter pub get

      - name: Add macOS desktop support
        run: flutter create --platforms=macos .

      - name: Configure macOS permissions
        run: |
          chmod +x scripts/configure_platforms.sh
          ./scripts/configure_platforms.sh macos

      - run: flutter build macos --release

      - name: Upload macOS App
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/*.app
