name: Build Flutter App

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      platforms:
        description: '构建平台 (逗号分隔: android,macos)'
        required: false
        default: 'android,macos'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 🔧 安装 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 📋 Flutter 环境检查
        run: flutter doctor -v

      # ── 重要：先备份 pubspec.yaml，flutter create 会覆盖它 ──
      - name: 💾 备份 pubspec.yaml
        run: cp pubspec.yaml pubspec.yaml.bak

      - name: 🏗️ 生成平台目录 (android/, macos/)
        run: flutter create --platforms=android,macos .

      # ── 恢复原始 pubspec.yaml（包含 http、shelf、flutter_blue_plus 等依赖） ──
      - name: ♻️ 恢复 pubspec.yaml
        run: mv pubspec.yaml.bak pubspec.yaml

      - name: 🧹 清除过期 pubspec.lock
        run: rm -f pubspec.lock

      - name: ⚙️ 配置平台权限
        run: |
          chmod +x scripts/configure_platforms.sh
          bash scripts/configure_platforms.sh

      - name: 📦 安装依赖
        run: flutter pub get

      - name: 🔍 静态分析
        run: flutter analyze
        continue-on-error: true

      # ==================== Android APK ====================
      - name: 🤖 构建 Android APK
        run: flutter build apk --release

      - name: 📤 上传 Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      # ==================== macOS App ====================
      - name: 🍎 构建 macOS App
        run: flutter build macos --release

      - name: 📦 打包 macOS App (zip)
        run: |
          cd build/macos/Build/Products/Release
          zip -r sanjoyapp_print-macos.zip sanjoyapp_print.app

      - name: 📤 上传 macOS App
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: build/macos/Build/Products/Release/sanjoyapp_print-macos.zip
          retention-days: 90

      # ==================== 创建 Release ====================
      - name: 🎉 创建 GitHub Release（仅 tag 触发）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/macos/Build/Products/Release/sanjoyapp_print-macos.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
